name: Deploy Zalo Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy lên VPS qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/zalo-bot

            # Pull code mới nhất
            git pull origin main

            mkdir -p data
            touch data/logs.json

            # KHÔNG xóa session.json — giữ nguyên session đã đăng nhập

            # Build image mới trực tiếp trên VPS
            docker compose build --no-cache

            # Restart container
            docker compose up -d --force-recreate

            # Dọn image cũ
            docker image prune -f

            echo "✅ Deploy xong!"
